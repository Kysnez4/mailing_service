{% extends 'base.html' %}
{% block content %}
<h2>{% if object %}Редактировать{% else %}Добавить{% endif %} получателя</h2>
<div class="card">
    <div class="card-body">
        <form method="post">{% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="{% url 'client_list' %}" class="btn btn-secondary">Назад</a>
        </form>
    </div>
</div>

{% endblock %}
