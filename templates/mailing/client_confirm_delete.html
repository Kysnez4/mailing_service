{% extends 'base.html' %}
{% block content %}
<h2>Удалить получателя</h2>
<p>Вы уверены, что хотите удалить получателя <strong>{{ object.full_name }}</strong> ({{ object.email }})?</p>
<form method="post">{% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'client_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
