{% extends 'base.html' %}
{% block content %}
<h2>Получатели</h2>
<a href="{% url 'client_create' %}" class="btn btn-primary mb-2">Добавить получателя</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Email</th>
            <th>ФИО</th>
            <th>Комментарий</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for client in object_list %}
        <tr>
            <td>{{ client.email }}</td>
            <td>{{ client.full_name }}</td>
            <td>{{ client.comment }}</td>
            <td>
                <a href="{% url 'client_update' client.pk %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'client_delete' client.pk %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">Нет получателей</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
