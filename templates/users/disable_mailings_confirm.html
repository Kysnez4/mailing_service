{% extends 'base.html' %}
{% block content %}
<h2>Отключение рассылок</h2>
<p>Вы уверены, что хотите отключить все рассылки пользователя <strong>{{ user.email }}</strong>?</p>
<form method="post">{% csrf_token %}
    <button type="submit" class="btn btn-warning">Отключить рассылки</button>
    <a href="{% url 'user_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
