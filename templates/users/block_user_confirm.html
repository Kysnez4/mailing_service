{% extends 'base.html' %}
{% block content %}
<h2>Блокировка пользователя</h2>
<p>Вы уверены, что хотите заблокировать пользователя <strong>{{ user.email }}</strong>?</p>
<form method="post">{% csrf_token %}
    <button type="submit" class="btn btn-danger">Блокировать</button>
    <a href="{% url 'user_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
